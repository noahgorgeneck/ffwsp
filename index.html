<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#b6252a">
  <title>FFW Kalender</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="app-header">
    <div>
      <p class="eyebrow">Uebungsplan_2025.ics</p>
      <h1>FFW Kalender</h1>
    </div>
    <div class="header-actions">
      <button id="reloadButton" class="icon-button" title="Kalender neu laden" aria-label="Kalender neu laden">
        <span aria-hidden="true">↻</span>
      </button>
      <button id="exportButton" class="icon-button" title="ICS herunterladen" aria-label="ICS herunterladen">
        <span aria-hidden="true">↓</span>
      </button>
    </div>
  </header>

  <main class="app-shell">
    <section class="toolbar" aria-label="Kalenderwerkzeuge">
      <div class="search-box">
        <label for="searchInput">Suche</label>
        <input id="searchInput" type="search" placeholder="Titel, Beschreibung, Leiter">
      </div>
      <div class="field compact">
        <label for="yearFilter">Jahr</label>
        <select id="yearFilter"></select>
      </div>
      <div class="field compact">
        <label for="typeFilter">Typ</label>
        <select id="typeFilter">
          <option value="all">Alle</option>
          <option value="timed">Mit Uhrzeit</option>
          <option value="all-day">Ganztag</option>
        </select>
      </div>
      <button id="addButton" class="primary-button" type="button">+ Termin</button>
    </section>

    <section class="content-grid">
      <aside class="event-list-panel" aria-label="Termine">
        <div class="list-summary">
          <strong id="eventCount">0 Termine</strong>
          <span id="dirtyState">Gespeichert</span>
        </div>
        <div id="eventList" class="event-list"></div>
      </aside>

      <section class="editor-panel" aria-label="Termin bearbeiten">
        <form id="eventForm" class="event-form">
          <input id="eventId" type="hidden">
          <div class="form-row">
            <label for="summaryInput">Titel</label>
            <input id="summaryInput" required>
          </div>
          <div class="form-row">
            <label for="descriptionInput">Beschreibung</label>
            <textarea id="descriptionInput" rows="4"></textarea>
          </div>
          <div class="switch-row">
            <label for="allDayInput">Ganztag</label>
            <input id="allDayInput" type="checkbox">
          </div>
          <div class="two-columns">
            <div class="form-row">
              <label for="startDateInput">Startdatum</label>
              <input id="startDateInput" type="date" required>
            </div>
            <div class="form-row time-field">
              <label for="startTimeInput">Startzeit</label>
              <input id="startTimeInput" type="time">
            </div>
          </div>
          <div class="two-columns">
            <div class="form-row">
              <label for="endDateInput">Enddatum</label>
              <input id="endDateInput" type="date" required>
            </div>
            <div class="form-row time-field">
              <label for="endTimeInput">Endzeit</label>
              <input id="endTimeInput" type="time">
            </div>
          </div>
          <div class="button-row">
            <button id="saveEventButton" class="primary-button" type="submit">Termin übernehmen</button>
            <button id="duplicateButton" type="button">Duplizieren</button>
            <button id="deleteButton" class="danger-button" type="button">Löschen</button>
          </div>
        </form>

        <details class="import-panel">
          <summary>Liste importieren</summary>
          <div class="import-grid">
            <div class="form-row">
              <label for="importFileInput">Datei</label>
              <input id="importFileInput" type="file" accept=".pdf,.txt,.csv,text/plain,application/pdf">
            </div>
            <div class="form-row">
              <label for="importTextInput">Text einfügen</label>
              <textarea id="importTextInput" rows="5" placeholder="Datum Uhr Typ Bezeichnung Übungsleiter"></textarea>
            </div>
            <button id="importPreviewButton" class="primary-button" type="button">Import prüfen</button>
          </div>
        </details>

        <details class="publish-panel">
          <summary>GitHub speichern</summary>
          <div class="publish-grid">
            <div class="form-row">
              <label for="tokenInput">GitHub Token</label>
              <input id="tokenInput" type="password" autocomplete="off" placeholder="Fine-grained Token mit Contents: Read/Write">
            </div>
            <div class="form-row">
              <label for="messageInput">Commit-Nachricht</label>
              <input id="messageInput" value="Uebungsplan_2025.ics aktualisieren">
            </div>
            <div class="switch-row autosave-row">
              <label for="autoSaveInput">Auto-Speichern</label>
              <input id="autoSaveInput" type="checkbox">
            </div>
            <p id="autoSaveStatus" class="status-line">Auto-Speichern aus</p>
            <button id="publishButton" class="primary-button" type="button">An GitHub senden</button>
          </div>
        </details>
      </section>
    </section>
  </main>

  <dialog id="importDialog" class="import-dialog">
    <div class="dialog-header">
      <div>
        <p class="eyebrow">Import-Vorschau</p>
        <h2>Erkannte Termine prüfen</h2>
      </div>
      <button id="importCloseButton" class="icon-button" type="button" title="Schließen" aria-label="Schließen">×</button>
    </div>
    <p id="importCount" class="status-line">0 Termine erkannt</p>
    <div class="import-table-wrap">
      <table class="import-table">
        <thead>
          <tr>
            <th>OK</th>
            <th>Datum</th>
            <th>Zeit</th>
            <th>Titel</th>
            <th>Beschreibung</th>
          </tr>
        </thead>
        <tbody id="importPreviewBody"></tbody>
      </table>
    </div>
    <div class="button-row dialog-actions">
      <button id="importApplyButton" class="primary-button" type="button">Ausgewählte übernehmen</button>
      <button id="importCancelButton" type="button">Abbrechen</button>
    </div>
  </dialog>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script src="app.js" defer></script>
</body>
</html>
